    .nav-links a { font-size: 13px; color: var(--earth); text-decoration: none; }
    .nav-links a:hover { color: var(--ink); }

    .page-header { max-width: 900px; margin: 0 auto; padding: 40px 24px 28px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 500; margin-bottom: 6px; }

    .filter-btn {
      background: white; border: 0.5px solid var(--stone); border-radius: 20px;

      font-family: 'DM Sans', sans-serif; transition: all .15s;

    .filter-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

    .venue-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
    .venue-sub { font-size: 11px; color: var(--earth); }
    .score-badge {
      display: flex; flex-direction: column; align-items: center;
      border-radius: 8px; padding: 6px 10px; min-width: 50px; text-align: center;
    }
    .score-n { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; line-height: 1; }

    .bars { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-label { font-size: 11px; color: var(--earth); width: 90px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 4px; background: var(--stone); border-radius: 2px; overflow: hidden; }

<body><script>
(function(){
  var pw='wellnessflex';
  var key='auric_access';
  if(sessionStorage.getItem(key)==='true') return;
  document.addEventListener('DOMContentLoaded', function(){
    var o = document.createElement('div');
    o.id = 'ag';
    o.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#FAF8F4;display:flex;align-items:center;justify-content:center;z-index:99999';
    o.innerHTML = '<div style="text-align:center;padding:48px 32px;max-width:360px;width:100%;font-family:DM Sans,sans-serif">'
      + '<div style="font-family:Cormorant Garamond,serif;font-size:42px;font-weight:500;color:#2C2418;line-height:1;margin-bottom:8px">auric<span style="color:#C9A84C">.</span>os</div>'
      + '<p style="font-size:12px;color:#B5A48A;margin-bottom:28px">Private beta &middot; Enter your password</p>'
      + '<input id="agpw" type="password" placeholder="Access password" style="width:100%;height:46px;border:1px solid #EDE9E0;border-radius:10px;padding:0 16px;font-size:14px;background:white;color:#2C2418;outline:none;margin-bottom:10px;box-sizing:border-box">'
      + '<button onclick="aggo()" style="width:100%;height:46px;background:#2C2418;color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-bottom:10px">Enter</button>'
      + '<div id="agerr" style="font-size:12px;color:#C47D7D;min-height:18px"></div>'
      + '<p style="font-size:11px;color:#B5A48A;margin-top:20px">No password? <a href="mailto:auricmovement@outlook.com" style="color:#C9A84C">Request access</a></p>'
      + '</div>';
    document.body.appendChild(o);
    document.getElementById('agpw').addEventListener('keydown', function(e){ if(e.key==='Enter') aggo(); });
    document.getElementById('agpw').focus();
  });
  window.aggo = function(){
    var v = document.getElementById('agpw').value.trim();
    if(v === pw){
      sessionStorage.setItem(key,'true');
      document.getElementById('ag').remove();
    } else {
      document.getElementById('agerr').textContent = 'Incorrect password. Try again.';
      document.getElementById('agpw').value = '';
    }
  };
})();
</script>

let activeFilter = 'all';

function filter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = activeFilter === 'all'
    ? venues
    : venues.filter(v => v.type === activeFilter || v.type2 === activeFilter);

  filtered.forEach(v => {
    const card = document.createElement('div');
    card.className = 'venue-card' + (v.free ? ' free' : '');
    card.innerHTML = `
      ${v.freeNote ? `<div class="free-banner">Free space · ${v.freeNote}</div>` : ''}
      <div class="card-top">
        <div>
          <div class="venue-name">${v.name}</div>
          <div class="venue-sub">${v.sub}</div>
        </div>
        <div class="score-badge" style="background:${v.scoreColor}">
          <div class="score-n" style="color:${v.scoreText}">${v.score}</div>
          <div class="score-l" style="color:${v.scoreText}">fit</div>
        </div>
      </div>
      <div class="bars">
        ${v.bars.map(b => `
          <div class="bar-row">
            <div class="bar-label">${b.label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${b.pct}%;background:${b.color}"></div></div>
          </div>
        `).join('')}
      </div>
      <div class="tags">${v.tags.map(t => `<span class="tag ${t.cls}">${t.text}</span>`).join('')}</div>
      <div class="access-section">
        <div class="access-title">Getting there</div>
        ${v.access.map(a => `
          <div class="access-row">
            <div class="access-dot" style="background:${a.color}"></div>
            ${a.text}
          </div>
        `).join('')}
      </div>
      <div class="card-actions">
        <button class="btn-outreach" onclick="draftOutreach('${v.name}', \`${v.outreach.replace(/`/g,'\\`')}\`)">Draft outreach email</button>
        <button class="btn-outline" onclick="askAssistant('${v.name}')">Ask AI</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function draftOutreach(name, text) {
  const subject = encodeURIComponent(`Event space inquiry — ${name}`);
  const body = encodeURIComponent(text + '\n\nWarm regards,\n[Your name]\nAuric Movement');
  window.open(`mailto:?subject=${subject}&body=${body}`);
}

function askAssistant(name) {
  sessionStorage.setItem('assistantPrompt', `Tell me more about hosting a wellness event at ${name} — what should I know before reaching out?`);
  window.location.href = 'assistant.html';
}

renderGrid();

window.addEventListener('load', () => {
  const prompt = sessionStorage.getItem('assistantPrompt');
  if (prompt) sessionStorage.removeItem('assistantPrompt');
});
</script>

</body>
</html>
