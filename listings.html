    .nav-links a:hover { color: var(--ink); }

    .bar-track { flex: 1; height: 4px; background: var(--stone); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 0; }
    .tag { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
    .tag-green { background: var(--sage-l); color: var(--sage-d); }
    .tag-gold { background: var(--gold-l); color: var(--gold-d); }
    .tag-sky { background: var(--sky-l); color: var(--sky-d); }

let activeFilter = 'all';
let activeModality = 'all';

function filter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn:not(.modality-btn)').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filterModality(modality, btn) {
  activeModality = modality;
  document.querySelectorAll('.filter-btn.modality-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let filtered = venues;
  if (activeFilter === 'free') filtered = filtered.filter(v => v.free);
  else if (activeFilter === 'no-cert') filtered = filtered.filter(v => v.requirements.some(r => r.dot === 'req-none' && r.text.toLowerCase().includes('no instructor') || r.dot === 'req-none' && r.text.toLowerCase().includes('no certification')));
  else if (activeFilter !== 'all') filtered = filtered.filter(v => v.type === activeFilter);
  if (activeModality !== 'all') filtered = filtered.filter(v => (v.modalities || []).includes(activeModality));

  filtered.forEach(v => {
    const card = document.createElement('div');
    card.className = 'venue-card' + (v.free ? ' free' : '');
    card.innerHTML = `
      ${v.free ? `<div class="free-banner"><svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="#1A5A1A" stroke-width="1.5"><path d="M9 12l2 2 4-4"/><circle cx="10" cy="10" r="8"/></svg> Free space · ${v.priceNote}</div>` : ''}
      <div class="card-top">
        <div class="card-title-row">
          <div>
            <div class="venue-name">${v.name}</div>
            <div class="venue-sub">${v.sub}</div>
          </div>
          <div class="score-badge" style="background:${v.scoreColor}">
            <div class="score-n" style="color:${v.scoreText}">${v.score}</div>
            <div class="score-l" style="color:${v.scoreText}">fit</div>
          </div>
        </div>
        <div class="price-row">
          ${v.free
            ? `<span class="price-free">${v.price}</span>`
            : `<span class="price-main">${v.price}</span>`}
          <span class="price-note">${v.free ? '' : v.priceNote}</span>
        </div>
        <div class="bars">
          ${v.bars.map(b => `
            <div class="bar-row">
              <div class="bar-label">${b.label}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${b.pct}%;background:${b.color}"></div></div>
            </div>`).join('')}
        </div>
        <div class="tags">${v.tags.map(t => `<span class="tag ${t.c}">${t.t}</span>`).join('')}</div>
      </div>

      <div class="card-section">
        <div class="section-title">Certifications & insurance</div>
        ${v.requirements.map(r => `
          <div class="req-row">
            <div class="req-dot ${r.dot}"></div>
            <div>${r.text}</div>
          </div>`).join('')}
      </div>

      <div class="card-section">
        <div class="section-title">Getting there</div>
        ${v.access.map(a => `
          <div class="access-row">
            <div class="access-dot" style="background:${a.color}"></div>
            ${a.text}
          </div>`).join('')}
      </div>

      <div class="card-actions">
        ${v.bookingUrl ? `<a href="${v.bookingUrl}" target="_blank" class="btn-book">
          <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.5"><path d="M10 3v14M3 10h14" stroke-linecap="round"/></svg>
          ${v.bookingLabel}
        </a>` : ''}
        <button class="btn-outreach" onclick="draftOutreach('${v.name.replace(/'/g,"\\'")}', \`${v.outreach.replace(/`/g,'\\`')}\`)">Draft outreach</button>
        <button class="btn-outline" onclick="askAssistant('${v.name.replace(/'/g,"\\'")}')">Ask AI</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function draftOutreach(name, text) {
  const subject = encodeURIComponent('Event space inquiry — ' + name);
  const body = encodeURIComponent(text + '\n\nWarm regards,\n[Your name]\nAuric Movement');
  window.open('mailto:?subject=' + subject + '&body=' + body);
}

function askAssistant(name) {
  sessionStorage.setItem('assistantPrompt', 'Tell me more about hosting a wellness event at ' + name + ' — what should I know about their certification requirements, insurance needs, and how to approach the booking?');
  window.location.href = 'assistant.html';
}

renderGrid();
</script>
